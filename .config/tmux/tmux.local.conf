# Local command center tmux config (C-a prefix)
# Used on macOS to manage SSH sessions to remote machines

# Shared settings
source-file ~/.config/tmux/tmux.shared.conf

# Prefix: C-a (remote machines use C-b)
unbind C-b
set-option -g prefix C-a
bind C-a send-prefix

# Send prefix to nested remote tmux
bind a send-prefix -2

# Copy to macOS clipboard
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# --- STATUS BAR ---
set -g status-position top
set -g status-interval 3

# Instant status refresh on window events
set-hook -g after-select-window "refresh-client -S"
set-hook -g after-new-window "refresh-client -S"
set-hook -g window-linked "refresh-client -S"
set-hook -g window-unlinked "refresh-client -S"

# Disable default window list (custom status-format handles it)
set -g window-status-format ""
set -g window-status-current-format ""
set -g status-style "bg=#0B0E14"
set -g status-left ""
set -g status-right ""

# Don't auto-rename (dev command sets window names)
set -g automatic-rename off
set -g allow-rename off

# Keep dead panes open only on failure so you can see why they exited
set -g remain-on-exit failed
bind q kill-pane

# Intercept C-b: flash on remote status line, then forward to pane
bind -n C-b set -g @remote_prefix 1 \; send-keys C-b \; run-shell "sleep 1 && tmux set -g @remote_prefix 0"

# Smart splits: on remote windows (name contains ":"), open a new local window instead
# On local windows, split normally
bind v if-shell "tmux display-message -p '#{window_name}' | grep -q ':'" \
  "new-window -c '#{pane_current_path}'" \
  "split-window -h -c '#{pane_current_path}'"
bind h if-shell "tmux display-message -p '#{window_name}' | grep -q ':'" \
  "new-window -c '#{pane_current_path}'" \
  "split-window -v -c '#{pane_current_path}'"

# --- Mouse on status bar ---
# Left   = switch to clicked window
# Middle = kill clicked window
# Right  = preview popup of clicked window's pane
bind -n MouseDown1Status run-shell "~/.local/bin/dev-click #{mouse_y} select  #{mouse_x}"
bind -n MouseDown2Status run-shell "~/.local/bin/dev-click #{mouse_y} kill    #{mouse_x}"
bind -n MouseDown3Status run-shell "~/.local/bin/dev-click #{mouse_y} preview #{mouse_x}"

# Load generated status lines (from dev setup)
source-file -q ~/.config/dev/tmux-status.conf

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
