# Shared tmux settings (sourced by both local and remote configs)

# 256 colors + true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:sitm=\E[3m'
set -as terminal-overrides ',*:ritm=\E[23m'
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[2 q'

# Mouse
set -g mouse on

# Window/pane indexing from 1
set -g base-index 1
set -g pane-base-index 1
set-option -g renumber-windows on

# Pane splitting (v = left/right, h = top/bottom)
unbind %
bind v split-window -h -c "#{pane_current_path}"
unbind '"'
bind h split-window -v -c "#{pane_current_path}"

# Resize panes
bind -n S-Left resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Up resize-pane -U 2
bind -n S-Down resize-pane -D 2

# vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Copy mode vi keys
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Quick window switching (Alt+number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Buffer viewer — scrollable popup of current pane's last 500 lines
bind b run-shell "tmux capture-pane -p -S -500 > /tmp/tmux-buffer-$$.txt" \; display-popup -w 80% -h 80% -E "less +G /tmp/tmux-buffer-*.txt; rm -f /tmp/tmux-buffer-*.txt"

# Window picker with preview — fzf to peek and switch windows
bind B display-popup -w 80% -h 80% -E " \
  tmux list-windows -F '#{window_index}:#{window_name}' | \
  fzf --preview 'tmux capture-pane -t \$(echo {} | cut -d: -f1) -p -S -30 2>/dev/null' \
      --preview-window=down:60% | \
  cut -d: -f1 | xargs -I{} tmux select-window -t {}"

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
