# Remote tmux config (C-b prefix)
# Used on devbox/GPU machines via SSH

# Shared settings
source-file ~/.config/tmux/tmux.shared.conf

# Override terminal for remote — xterm-256color has better Unicode support on Linux
set -g default-terminal "xterm-256color"

# Prefix: C-b (default, distinct from local C-a)
set -g prefix C-b
bind C-b send-prefix

# Copy to system clipboard (Linux xclip)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"

# Toggle status bar
bind s set-option -g status

# Status bar — minimal when nested (just prefix flash), full when direct SSH
set -g status-position bottom
set -g status-style "bg=#0B0E14,fg=#475266"
set -g status-left-length 30
set -g status-left ""
set -g status-right ""

# Hide window list (local command center handles it)
set -g window-status-format ""
set -g window-status-current-format ""

# Initialize TPM (keep at bottom)
run -b '~/.tmux/plugins/tpm/tpm'
