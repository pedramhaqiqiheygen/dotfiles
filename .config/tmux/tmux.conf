# Remote tmux config (C-b prefix)
# Used on devbox/GPU machines via SSH

# Shared settings
source-file ~/.config/tmux/tmux.shared.conf
source-file ~/.config/tmux/theme.conf

# Prefix: C-b (default, distinct from local C-a)
set -g prefix C-b
bind C-b send-prefix

# Copy to system clipboard (Linux xclip)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -i -f -selection primary | xclip -i -selection clipboard"

# Toggle status bar
bind s set-option -g status

# Status bar — hostname + session name (green to indicate remote)
set -g status-position top
set -g status-style "bg=${BG},fg=${FG_DIM}"
set -g status-left-length 30
set -g status-left "#[fg=#1e1e2e,bg=${HEALTH_OK},bold] #h:#S #[default] "
set -g status-right "#[fg=${FG_DIM}] %H:%M "

# Window format
set -g window-status-format "#[fg=${FG_DIM}] #I:#W "
set -g window-status-current-format "#[fg=${FG_ACTIVE},bold] #I:#W "

# Initialize TPM (keep at bottom)
run -b '~/.tmux/plugins/tpm/tpm'
