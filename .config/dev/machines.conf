# Dev Command Center - Machine Configuration
# Format: name|ssh_host|workspace|icon|color|show_on_status
# Lines starting with # are comments. Blank lines are ignored.
#
# name:            Friendly name (used in `dev <name>`)
# ssh_host:        SSH host alias (from ~/.ssh/config)
# workspace:       Path to repos on remote machine
# icon:            Nerd Font icon (Material Design range)
# color:           Hex color for status bar label
# show_on_status:  true/false — show as a line on tmux status bar
#
# Add new machines by adding a line. Run `dev setup` to auto-detect SSH hosts.

